<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Esponal</title>
    <style>
      body {
        min-width: 220px;
        margin: 0;
        padding: 16px;
        color: #1f2933;
        font-family: Arial, Helvetica, sans-serif;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      p {
        margin: 0 0 14px;
        color: #52616f;
        font-size: 13px;
        line-height: 1.5;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 6px;
        background: #c2413b;
        color: white;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        padding: 9px 12px;
      }

      button + button {
        margin-top: 8px;
        background: #2f8f6f;
      }

    <p>西语沉浸学习插件已准备好。</p>
    <button id="toggleChinese" type="button">隐藏中文翻译</button>

    <script src="popup.js"></script>
