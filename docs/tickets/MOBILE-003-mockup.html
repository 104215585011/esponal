<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Esponal · 首页移动端模型 (MOBILE-003 v3 · 干净现代)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --bg-soft:#f7f8f7;
    --ink:#121413;
    --ink-2:#3f433f;
    --muted:#8a8f88;
    --line:#eceeec;
    --brand:#10b981;
    --brand-deep:#059669;
    --brand-soft:#ecf8f2;
    --card:#ffffff;
    --shadow:0 1px 2px rgba(16,24,20,.04), 0 8px 24px -16px rgba(16,24,20,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#e9eae8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px;
    font-family:"Noto Sans SC",sans-serif;-webkit-font-smoothing:antialiased;
  }
  .num,.lat{font-family:"Plus Jakarta Sans","Noto Sans SC",sans-serif}
  .phone{
    width:390px;max-width:100%;height:844px;border-radius:44px;overflow:hidden;position:relative;background:var(--bg);
    box-shadow:0 40px 90px -20px rgba(0,0,0,.4), 0 0 0 10px #16181a, 0 0 0 11px #2a2d30;
  }
  .scroll{height:100%;overflow-y:auto;overflow-x:hidden}
  .scroll::-webkit-scrollbar{display:none}

  /* top bar */
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;background:rgba(255,255,255,.78);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
  .avatar{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;
    background:var(--brand);color:#fff;font-weight:700;font-size:14px;font-family:"Plus Jakarta Sans"}
  .tb-mid{display:flex;align-items:center;gap:6px;color:var(--ink-2);font-size:13px;font-weight:500}
  .tb-mid svg{width:16px;height:16px;stroke:var(--muted)}
  .icon-btn{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;color:var(--ink)}
  .icon-btn svg{width:20px;height:20px}

  /* hero — clean, airy */
  .hero{padding:30px 22px 4px}
  .greet{font-size:13px;color:var(--brand-deep);font-weight:600;letter-spacing:.02em;margin-bottom:14px;
    display:inline-flex;align-items:center;gap:7px}
  .greet .d{width:7px;height:7px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 4px var(--brand-soft)}
  .hero h1{font-size:33px;line-height:1.32;font-weight:700;color:var(--ink);letter-spacing:-.01em}
  .hero h1 em{font-style:normal;color:var(--brand-deep)}
  .hero p{margin-top:14px;font-size:14px;line-height:1.8;color:var(--muted);font-weight:300;max-width:300px}
  .cta{margin-top:22px;display:inline-flex;align-items:center;gap:10px;background:var(--brand);color:#fff;
    padding:13px 22px 13px 24px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;
    box-shadow:0 8px 20px -8px rgba(16,185,129,.5);transition:transform .18s, box-shadow .18s}
  .cta:active{transform:translateY(1px) scale(.99)}
  .cta svg{width:17px;height:17px;stroke:#fff}

  /* stat */
  .stat{margin:24px 22px 0;display:flex;gap:0;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--card)}
  .stat .cell{flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:2px}
  .stat .cell + .cell{border-left:1px solid var(--line)}
  .stat .n{font-family:"Plus Jakarta Sans";font-size:22px;font-weight:700;color:var(--ink);line-height:1;
    display:flex;align-items:baseline;gap:4px}
  .stat .n i{font-style:normal;font-size:12px;color:var(--muted);font-weight:500;font-family:"Noto Sans SC"}
  .stat .k{font-size:11.5px;color:var(--muted)}

  /* section */
  .sec{margin-top:38px}
  .sec-h{padding:0 22px;display:flex;align-items:center;justify-content:space-between}
  .sec-h h2{font-size:18px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
  .sec-h .more{font-size:12.5px;color:var(--muted);font-weight:500}
  .sec-sub{padding:5px 22px 0;font-size:13px;color:var(--muted);font-weight:300}

  /* learning path cards — clean */
  .rail{margin-top:18px;display:flex;gap:13px;overflow-x:auto;padding:2px 22px 8px;scroll-snap-type:x mandatory}
  .rail::-webkit-scrollbar{display:none}
  .pcard{scroll-snap-align:start;flex:0 0 195px;background:var(--card);border:1px solid var(--line);
    border-radius:20px;padding:18px 18px 16px;box-shadow:var(--shadow);transition:transform .18s,border-color .18s}
  .pcard:active{transform:translateY(-2px)}
  .pnum{width:38px;height:38px;border-radius:12px;background:var(--brand-soft);color:var(--brand-deep);
    display:grid;place-items:center;font-family:"Plus Jakarta Sans";font-weight:700;font-size:16px}
  .pcard h3{margin-top:16px;font-size:16.5px;font-weight:600;color:var(--ink)}
  .pcard .d{margin-top:8px;font-size:12.5px;line-height:1.7;color:var(--muted);font-weight:300;min-height:55px}
  .pcard .prog{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:11px;color:var(--brand-deep);
    background:var(--brand-soft);padding:4px 9px;border-radius:999px;font-weight:600}
  .pcard .go{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);display:flex;align-items:center;
    justify-content:space-between;font-size:12.5px;color:var(--ink);font-weight:600}
  .pcard .go svg{width:16px;height:16px;stroke:var(--brand)}

  .footer{margin:44px 22px 36px;font-size:11px;color:#c2c6c1;font-family:"Plus Jakarta Sans";letter-spacing:.06em}

  /* bottom tab */
  .tabbar{position:sticky;bottom:0;z-index:20;display:flex;justify-content:space-around;
    padding:9px 8px calc(9px + env(safe-area-inset-bottom));
    background:rgba(255,255,255,.9);backdrop-filter:blur(18px);border-top:1px solid var(--line)}
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;color:var(--muted);font-weight:500}
  .tab svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7}
  .tab.on{color:var(--brand-deep);font-weight:700}

  .anim{opacity:0;transform:translateY(12px);animation:rise .6s cubic-bezier(.2,.7,.2,1) forwards}
  .d1{animation-delay:.04s}.d2{animation-delay:.12s}.d3{animation-delay:.2s}
  @keyframes rise{to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="phone">
  <div class="scroll">
    <div class="topbar">
      <div class="avatar">某</div>
      <div class="tb-mid">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path stroke-linecap="round" d="M4 7h16M4 12h16M4 17h16"/></svg>
        订阅
      </div>
      <div class="icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="m20 20-3.2-3.2"/></svg>
      </div>
    </div>

    <!-- hero -->
    <section class="hero anim d1">
      <span class="greet"><span class="d"></span>欢迎回来</span>
      <h1>西班牙语，<br>从<em>听懂</em>开始</h1>
      <p>继续你的西语之旅。下一步——发音、阅读、视频和对话，都已经帮你排好。</p>
      <div class="cta">开始学习
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14m-6-6 6 6-6 6"/></svg>
      </div>
    </section>

    <!-- stat -->
    <div class="stat anim d2">
      <div class="cell"><div class="n">119 <i>词</i></div><div class="k">已收藏</div></div>
      <div class="cell"><div class="n">4 <i>篇</i></div><div class="k">已读文章</div></div>
    </div>

    <!-- learning path -->
    <section class="sec anim d3">
      <div class="sec-h"><h2>学习路径</h2></div>
      <div class="sec-sub">按这个顺序走，会更轻松一点。</div>
      <div class="rail">
        <article class="pcard">
          <div class="pnum">01</div>
          <h3>字母发音</h3>
          <div class="d">27 个字母和最常见的发音变化，从嘴型和节奏开始。</div>
          <div class="go">进入学习 <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2"><path stroke-linecap="round" d="M9 6l6 6-6 6"/></svg></div>
        </article>
        <article class="pcard">
          <div class="pnum">02</div>
          <h3>骨架课程</h3>
          <div class="d">按阶段把高频词、基础句型和最早该学的规则串起来。</div>
          <span class="prog">已收藏 119 词</span>
          <div class="go">进入学习 <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2"><path stroke-linecap="round" d="M9 6l6 6-6 6"/></svg></div>
        </article>
        <article class="pcard">
          <div class="pnum">03</div>
          <h3>阅读</h3>
          <div class="d">短篇分级小故事，适合通勤和碎片时间反复读。</div>
          <span class="prog">已读 4 篇</span>
          <div class="go">进入学习 <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2"><path stroke-linecap="round" d="M9 6l6 6-6 6"/></svg></div>
        </article>
      </div>
    </section>

    <div class="footer">Esponal</div>
  </div>

  <div class="tabbar">
    <div class="tab on"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m4 11 8-7 8 7M6 10v9h12v-9"/></svg>首页</div>
    <div class="tab"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="m10 9 5 3-5 3z" fill="currentColor" stroke="none"/></svg>视频</div>
    <div class="tab"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 5h9a3 3 0 0 1 3 3v11a2.5 2.5 0 0 0-2.5-2.5H4zM20 5h-1a3 3 0 0 0-3 3v11a2.5 2.5 0 0 1 2.5-2.5H20z"/></svg>阅读</div>
    <div class="tab"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4 3 8l9 4 9-4zM7 10v5l5 2 5-2v-5"/></svg>课程</div>
    <div class="tab"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 4h11l3 3v13H5zM9 9h7M9 13h7M9 17h4"/></svg>语料库</div>
  </div>
</div>
</body>
</html>
