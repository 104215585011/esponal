<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Esponal · 对话移动端模型 (MOBILE-006 · 干净现代)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;--bg-soft:#f7f8f7;--ink:#121413;--ink-2:#3f433f;--muted:#8a8f88;
    --line:#eceeec;--brand:#10b981;--brand-deep:#059669;--brand-soft:#ecf8f2;
    --shadow:0 1px 2px rgba(16,24,20,.04), 0 8px 24px -16px rgba(16,24,20,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#e9eae8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px;
    font-family:"Noto Sans SC",sans-serif;-webkit-font-smoothing:antialiased}
  .phone{width:390px;max-width:100%;height:844px;border-radius:44px;overflow:hidden;position:relative;background:var(--bg-soft);
    box-shadow:0 40px 90px -20px rgba(0,0,0,.4),0 0 0 10px #16181a,0 0 0 11px #2a2d30;
    display:flex;flex-direction:column}

  /* chat header */
  .chead{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:13px 16px;
    background:rgba(255,255,255,.82);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);z-index:10}
  .back{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:var(--ink)}
  .back svg{width:20px;height:20px;stroke:currentColor}
  .cavatar{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:18px;
    background:linear-gradient(135deg,#fef0c7,#fde68a);position:relative}
  .cavatar .on{position:absolute;right:-1px;bottom:-1px;width:11px;height:11px;border-radius:50%;background:var(--brand);border:2px solid #fff}
  .cinfo{flex:1;min-width:0}
  .cinfo .nm{font-size:15px;font-weight:600;color:var(--ink);line-height:1.2}
  .cinfo .st{font-size:11px;color:var(--muted);margin-top:1px}
  .cmenu{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:var(--ink)}
  .cmenu svg{width:20px;height:20px;stroke:currentColor}

  /* messages */
  .msgs{flex:1;overflow-y:auto;padding:18px 16px 8px;display:flex;flex-direction:column;gap:14px}
  .msgs::-webkit-scrollbar{display:none}
  .day{align-self:center;font-size:10.5px;color:var(--muted);background:rgba(0,0,0,.04);padding:3px 10px;border-radius:999px;margin:2px 0}

  .row{display:flex;gap:9px;max-width:84%}
  .row.ai{align-self:flex-start}
  .row.me{align-self:flex-end;flex-direction:row-reverse}
  .mini{flex:0 0 26px;width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:13px;
    background:linear-gradient(135deg,#fef0c7,#fde68a);align-self:flex-end;margin-bottom:2px}
  .bub{padding:11px 14px;border-radius:18px;font-size:15px;line-height:1.55}
  .ai .bub{background:#fff;color:var(--ink);border:1px solid var(--line);border-bottom-left-radius:6px;box-shadow:var(--shadow)}
  .me .bub{background:var(--brand);color:#fff;border-bottom-right-radius:6px}
  /* clickable spanish word demo */
  .ai .bub .w{border-bottom:1.5px dotted #cfd6cf;cursor:pointer}
  .ai .bub .w.act{background:var(--brand-soft);border-radius:5px;border-bottom-color:transparent;color:var(--brand-deep);font-weight:500}
  .trans{margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);font-size:12px;color:var(--muted);font-weight:300;display:flex;align-items:flex-start;gap:6px}
  .trans .spk{flex:0 0 auto;color:var(--brand);margin-top:1px}.trans .spk svg{width:14px;height:14px;stroke:currentColor;fill:none}

  /* typing */
  .typing{align-self:flex-start;display:flex;gap:9px}
  .typing .bub{background:#fff;border:1px solid var(--line);border-bottom-left-radius:6px;padding:13px 16px;display:flex;gap:4px}
  .typing .bub i{width:6px;height:6px;border-radius:50%;background:#c7ccc6;animation:blink 1.2s infinite}
  .typing .bub i:nth-child(2){animation-delay:.2s}.typing .bub i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}

  /* input */
  .input{flex:0 0 auto;display:flex;align-items:flex-end;gap:9px;padding:10px 14px calc(12px + env(safe-area-inset-bottom));
    background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line)}
  .field{flex:1;min-height:44px;max-height:120px;background:var(--bg-soft);border:1px solid var(--line);border-radius:22px;
    padding:12px 16px;font-size:14px;color:var(--ink);display:flex;align-items:center}
  .field .ph{color:#b4b9b2;font-weight:300}
  .mic,.send{flex:0 0 44px;width:44px;height:44px;border-radius:50%;display:grid;place-items:center}
  .mic{background:var(--bg-soft);border:1px solid var(--line);color:var(--ink-2)}.mic svg{width:20px;height:20px;stroke:currentColor;fill:none}
  .send{background:var(--brand);color:#fff;box-shadow:0 6px 14px -6px rgba(16,185,129,.6)}.send svg{width:19px;height:19px;stroke:#fff;fill:none}

  .anim{opacity:0;transform:translateY(8px);animation:rise .5s cubic-bezier(.2,.7,.2,1) forwards}
  .d1{animation-delay:.05s}.d2{animation-delay:.15s}.d3{animation-delay:.28s}.d4{animation-delay:.42s}
  @keyframes rise{to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="phone">
  <!-- header -->
  <div class="chead">
    <div class="back"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 6l-6 6 6 6"/></svg></div>
    <div class="cavatar">🧑🏻‍🏫<span class="on"></span></div>
    <div class="cinfo"><div class="nm">Carlos</div><div class="st">西班牙语 · 母语对话伙伴</div></div>
    <div class="cmenu"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path stroke-linecap="round" d="M4 7h16M4 12h16M4 17h16"/></svg></div>
  </div>

  <!-- messages -->
  <div class="msgs">
    <div class="day">今天</div>

    <div class="row ai anim d1">
      <div class="mini">🧑🏻‍🏫</div>
      <div class="bub">
        ¡<span class="w">Hola</span>! ¿<span class="w">Qué</span> <span class="w">tal</span> <span class="w">tu</span> <span class="w">día</span>?
        <div class="trans"><span class="spk"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M11 5 6 9H3v6h3l5 4zM16 9a4 4 0 0 1 0 6"/></svg></span>你好！今天过得怎么样？</div>
      </div>
    </div>

    <div class="row me anim d2">
      <div class="bub">Muy bien, gracias. Estoy aprendiendo español.</div>
    </div>

    <div class="row ai anim d3">
      <div class="mini">🧑🏻‍🏫</div>
      <div class="bub">
        ¡<span class="w">Qué</span> <span class="w act">bien</span>! ¿<span class="w">Desde</span> <span class="w">cuándo</span> <span class="w">estudias</span>?
        <div class="trans"><span class="spk"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M11 5 6 9H3v6h3l5 4zM16 9a4 4 0 0 1 0 6"/></svg></span>太好了！你从什么时候开始学的？</div>
      </div>
    </div>

    <div class="typing anim d4">
      <div class="mini">🧑🏻‍🏫</div>
      <div class="bub"><i></i><i></i><i></i></div>
    </div>
  </div>

  <!-- input -->
  <div class="input">
    <div class="field"><span class="ph">说点什么…</span></div>
    <div class="mic"><svg viewBox="0 0 24 24" stroke-width="1.8"><rect x="9" y="3" width="6" height="11" rx="3"/><path stroke-linecap="round" d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></div>
    <div class="send"><svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14m-6-6 6 6-6 6"/></svg></div>
  </div>
</div>
</body>
</html>
